name: Fix Historical Data

on:
  workflow_dispatch:

jobs:
  fix-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install psycopg2-binary

      - name: Diagnose and fix
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python3 << 'PYEOF'
          import os, psycopg2, psycopg2.extras

          conn = psycopg2.connect(os.environ["DATABASE_URL"])
          conn.autocommit = True
          cur = conn.cursor()

          # 1. Check weather_records state
          cur.execute("SELECT COUNT(*) FROM weather_records")
          wr_total = cur.fetchone()[0]
          cur.execute("SELECT MIN(timestamp), MAX(timestamp) FROM weather_records")
          wr_min, wr_max = cur.fetchone()
          cur.execute("SELECT COUNT(*) FROM weather_records WHERE weather_condition IS NULL")
          wr_null = cur.fetchone()[0]
          print(f"weather_records: {wr_total} rows, range {wr_min} ~ {wr_max}, NULLs: {wr_null}")

          # 2. Check availability_logs with NULL weather_condition
          cur.execute("SELECT COUNT(*) FROM availability_logs WHERE weather_condition IS NULL")
          al_null = cur.fetchone()[0]
          cur.execute("SELECT COUNT(*) FROM availability_logs")
          al_total = cur.fetchone()[0]
          cur.execute("SELECT MIN(timestamp), MAX(timestamp) FROM availability_logs WHERE weather_condition IS NULL")
          al_range = cur.fetchone()
          print(f"availability_logs: {al_total} rows, NULL weather_condition: {al_null}")
          if al_range[0]:
              print(f"  NULL range: {al_range[0]} ~ {al_range[1]}")

          # 3. Run the backfill for NULL weather_condition
          print("\nRunning weather backfill...")
          cur.execute("""
              UPDATE availability_logs a
              SET weather_condition = wr.weather_condition
              FROM (
                  SELECT DISTINCT ON (a2.id)
                      a2.id, r.weather_condition
                  FROM availability_logs a2
                  CROSS JOIN LATERAL (
                      SELECT r2.weather_condition
                      FROM weather_records r2
                      WHERE r2.timestamp <= a2.timestamp
                        AND r2.timestamp >= a2.timestamp - INTERVAL '2 hours'
                      ORDER BY ABS(EXTRACT(EPOCH FROM a2.timestamp - r2.timestamp))
                      LIMIT 1
                  ) r
                  WHERE a2.weather_condition IS NULL
              ) wr
              WHERE a.id = wr.id
          """)
          print(f"Backfilled {cur.rowcount} availability_logs rows")

          # 4. Re-check
          cur.execute("SELECT COUNT(*) FROM availability_logs WHERE weather_condition IS NULL")
          remaining = cur.fetchone()[0]
          print(f"Remaining NULL weather_condition: {remaining}")

          # 5. Show sample of what weather_condition values look like now
          cur.execute("""
              SELECT weather_condition, COUNT(*) as cnt
              FROM weather_records
              GROUP BY weather_condition
              ORDER BY cnt DESC
              LIMIT 15
          """)
          print("\nweather_condition distribution (top 15):")
          for row in cur.fetchall():
              print(f"  {row[0]}: {row[1]}")

          conn.close()
          PYEOF
