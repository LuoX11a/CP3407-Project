name: Trial Training

on:
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install psycopg2-binary pandas numpy scikit-learn lightgbm sqlalchemy joblib

      - name: Run trial training
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd ml
          python train.py --months 1 --n-estimators 100 --early-stopping 20 --output model/trial_model.joblib

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trial-model
          path: ml/model/trial_model.joblib
